<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="iosBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#222229" />
      <stop offset="100%" stop-color="#0B0B0E" />
    </linearGradient>

    <linearGradient id="bevelLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.16" />
      <stop offset="25%" stop-color="#FFFFFF" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5" />
    </linearGradient>

    <filter id="iosGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="elementShadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#000000" flood-opacity="0.65"/>
    </filter>

    <linearGradient id="cyanGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A3EFFF" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#46D9FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#46D9FF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="yellowGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE5A3" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#FFB834" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFB834" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="purpleGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5FF" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#D694FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D694FF" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <path d="M 20,100 C 20,32 32,20 100,20 C 168,20 180,32 180,100 C 180,168 168,180 100,180 C 32,180 20,168 20,100 Z" fill="url(#iosBg)"/>
  
  <path d="M 20,100 C 20,32 32,20 100,20 C 168,20 180,32 180,100 C 180,168 168,180 100,180 C 32,180 20,168 20,100 Z" fill="none" stroke="url(#bevelLight)" stroke-width="1.8"/>

  <path d="M 65,72 L 100,102 L 135,132" fill="none" stroke="#1A1A22" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 65,72 L 100,102 L 135,132" fill="none" stroke="#2D2D38" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <g filter="url(#elementShadow)">
    <path d="M 47,75 C 47,65 55,60 65,60 C 75,60 83,65 83,75 C 83,85 75,90 65,90 C 55,90 47,85 47,75 Z" fill="#11303B" opacity="0.9"/>
    <path d="M 47,72 C 47,62 55,57 65,57 C 75,57 83,62 83,72 C 83,82 75,87 65,87 C 55,87 47,82 47,72 Z" fill="url(#cyanGlass)" stroke="#46D9FF" stroke-width="1.2" stroke-opacity="0.85"/>
    <path d="M 69,65 C 67,65 65,66 65,69 L 65,73 C 65,76 63,78 61,78 M 62,71 L 68,71" fill="none" stroke="#46D9FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#iosGlow)"/>
    <path d="M 53,66 C 56,62 61,60 65,60" fill="none" stroke="url(#gloss)" stroke-width="1" stroke-linecap="round"/>
  </g>

  <g filter="url(#elementShadow)">
    <path d="M 82,105 C 82,95 90,90 100,90 C 110,90 118,95 118,105 C 118,115 110,120 100,120 C 90,120 82,115 82,105 Z" fill="#3D2D12" opacity="0.9"/>
    <path d="M 82,102 C 82,92 90,87 100,87 C 110,87 118,92 118,102 C 118,112 110,117 100,117 C 90,117 82,112 82,102 Z" fill="url(#yellowGlass)" stroke="#FFB834" stroke-width="1.2" stroke-opacity="0.85"/>
    <path d="M 95,96 L 93,96 L 93,100 L 91,102 L 93,104 L 93,108 L 95,108 M 105,96 L 107,96 L 107,100 L 109,102 L 107,104 L 107,108 L 105,108" fill="none" stroke="#FFB834" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#iosGlow)"/>
    <path d="M 88,96 C 91,92 96,90 100,90" fill="none" stroke="url(#gloss)" stroke-width="1" stroke-linecap="round"/>
  </g>

  <g filter="url(#elementShadow)">
    <path d="M 117,135 C 117,125 125,120 135,120 C 145,120 153,125 153,135 C 153,145 145,150 135,150 C 125,150 117,145 117,135 Z" fill="#311742" opacity="0.9"/>
    <path d="M 117,132 C 117,122 125,117 135,117 C 145,117 153,122 153,132 C 153,142 145,147 135,147 C 125,147 117,142 117,132 Z" fill="url(#purpleGlass)" stroke="#D694FF" stroke-width="1.2" stroke-opacity="0.85"/>
    <path d="M 135,124 L 141,127 L 135,130 L 129,127 Z M 129,127 L 129,134 L 135,137 L 141,134 L 141,127 M 135,130 L 135,137" fill="none" stroke="#D694FF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#iosGlow)"/>
    <path d="M 123,126 C 126,122 131,120 135,120" fill="none" stroke="url(#gloss)" stroke-width="1" stroke-linecap="round"/>
  </g>

  <g filter="url(#iosGlow)">
    <circle cx="160" cy="44" r="5" fill="#4ecc97" />
  </g>
  <circle cx="160" cy="44" r="1.5" fill="#FFFFFF" opacity="0.7"/>
</svg>
