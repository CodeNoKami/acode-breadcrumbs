<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Premium Dark Mode Viewport Base -->
  <rect width="200" height="200" rx="44" fill="#121216"/>
  <rect x="2" y="2" width="196" height="196" rx="42" fill="none" stroke="#1f1f26" stroke-width="1.5"/>

  <defs>
    <!-- Glowing Connection Path Gradient -->
    <linearGradient id="breadcrumbsGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#46D9FF" />
      <stop offset="50%" stop-color="#FFB834" />
      <stop offset="100%" stop-color="#D694FF" />
    </linearGradient>
    
    <!-- Subtle Bottom Glow Filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Perspective Connection Path -->
  <path d="M 60,70 L 100,100 L 140,130" fill="none" stroke="url(#breadcrumbsGlow)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" filter="url(#softGlow)"/>

  <!-- ================= LAYER 1: ROOT FILENAME (CYAN) ================= -->
  <g transform="translate(0, 0)">
    <!-- Left & Right 3D Thickness Sides -->
    <polygon points="42,76 60,84 60,90 42,82" fill="#174957" />
    <polygon points="60,84 78,76 78,82 60,90" fill="#22697d" />
    <!-- Top Isometric Surface Plate -->
    <polygon points="60,62 78,70 60,78 42,70" fill="#1a2b36" stroke="#46D9FF" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Minimalist Document Glyphs -->
    <path d="M 57,68 L 63,65 M 55,71 L 65,66" stroke="#46D9FF" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- ================= LAYER 2: NESTED CLASS (YELLOW) ================= -->
  <g transform="translate(0, 0)">
    <!-- Left & Right 3D Thickness Sides -->
    <polygon points="82,106 100,114 100,120 82,112" fill="#543d12" />
    <polygon points="100,114 118,106 118,112 100,120" fill="#7a591a" />
    <!-- Top Isometric Surface Plate -->
    <polygon points="100,92 118,100 100,108 82,100" fill="#332919" stroke="#FFB834" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Minimalist OOP Class Frame Brackets -->
    <path d="M 97,97 L 95,99 L 97,101 M 103,97 L 105,99 L 103,101" fill="none" stroke="#FFB834" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ================= LAYER 3: TARGET METHOD (PURPLE) ================= -->
  <g transform="translate(0, 0)">
    <!-- Left & Right 3D Thickness Sides -->
    <polygon points="122,136 140,144 140,150 122,142" fill="#461f59" />
    <polygon points="140,144 158,136 158,142 140,150" fill="#642d80" />
    <!-- Top Isometric Surface Plate -->
    <polygon points="140,122 158,130 140,138 122,130" fill="#291b36" stroke="#D694FF" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Minimalist Functional Terminal Node -->
    <circle cx="140" cy="130" r="2.5" fill="#D694FF"/>
  </g>

  <!-- Active Execution Beacon Dot -->
  <circle cx="140" cy="130" r="1" fill="#121216"/>
  <circle cx="158" cy="130" r="3" fill="#4ecc97" filter="url(#softGlow)"/>
</svg>
